# Netlify build + deploy configuration for Wayfare Construction Inspections

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force HTTPS + the www / apex behaviour your DNS prefers.
# Default here is to send everything to apex; flip if you prefer www.

[[redirects]]
  from = "https://www.inspections.wayfarecon.com/*"
  to = "https://inspections.wayfarecon.com/:splat"
  status = 301
  force = true

# Catch-all 404 (Astro generates /404/index.html — this points root 404s at it)
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Security + cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/reports/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
